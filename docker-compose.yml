version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=servicehub_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpass
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8081:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://admin:secretpass@db:5432/servicehub_db
      - SECRET_KEY=django-insecure-servicehub-secret-key-2025
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
